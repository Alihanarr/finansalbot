- name: Hafızayı Güncelle (history.txt dosyasını kaydet)
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        # Eğer dosya yoksa oluştur (hata vermemesi için)
        touch history.txt 
        git add history.txt
        # Değişiklik yoksa bile hata verme (|| true kısmı bu işe yarar)
        git commit -m "Hafıza güncellendi: $(date +'%d.%m.%Y')" || true
        git push
