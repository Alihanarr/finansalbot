name: Garanti Rapor Botu

on:
  schedule:
    - cron: '10 07,09,10,11,12,13 * * 1-5' # Hafta içi periyodik kontrol
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Kodu kopyala
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Kütüphaneleri Yukle
      run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: Raporlari Kontrol Et ve Analiz Et
      run: python downloader.py

    - name: Hafizayi Guncelle
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add history.json || true
        git commit -m "Hafiza guncellendi: $(date +'%d.%m.%Y')" || true
        git push
